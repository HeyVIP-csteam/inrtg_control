<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Issue Submission</title>
<link rel="stylesheet" href="/assets/style.css" />
<script src="/assets/theme.js"></script>
<script src="/assets/starfield.js" defer></script>
<script src="/assets/authguard.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <img src="/assets/img/logo.webp" alt="HeyVIP" class="logo-img" />
      <span class="wordmark">INR CS TEAM - TBC</span>
    </div>
    <div class="topbar-right">
      <span class="clock" id="liveClock"></span>
      <button class="theme-pill" id="themeToggle"></button>
      <span class="agent-whoami" id="agentWhoami"></span>
    </div>
  </header>

  <a href="/" class="back-pill">&larr; Back to Home</a>

  <div class="form-page">
    <div class="form-card">
      <div class="form-header"><span class="icon" id="formIcon"></span><span id="formTitle">Loading…</span></div>
      <p class="form-hint" id="formHint"></p>
      <hr class="form-divider" />

      <form id="issueForm">
        <div class="field">
          <label>Brand / Platform <span class="required">*</span></label>
          <select name="brand" required></select>
        </div>

        <div id="dynamicFields"></div>

        <div class="field">
          <span class="attach-label" id="attachLabel">Supporting Screenshots</span>
          <div class="dropzone" id="dropzone" tabindex="0">
            <div class="dz-icon">📎</div>
            <p class="dz-main">Click or drag files here</p>
            <p class="dz-sub" id="dzSub">JPG, PNG, PDF — Max 3 files</p>
            <p class="dz-paste">📋 Ctrl+V / ⌘V to paste screenshot</p>
          </div>
          <div class="file-list" id="fileList"></div>
          <input type="file" id="fileInput" multiple hidden />
        </div>

        <div class="field">
          <label><span id="reporterLabelText">Agent Name</span> <span class="required">*</span></label>
          <input type="text" name="reporter" required placeholder="Your agent name..." autocomplete="off" />
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-submit" id="submitBtn">
            <span>📨</span><span id="submitLabel">Submit</span>
          </button>
          <span id="statusMsg" class="status-msg"></span>
        </div>
      </form>
    </div>
  </div>

  <script src="/assets/schemas.js"></script>
  <script src="/assets/app.js"></script>
</body>
</html>
