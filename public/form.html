<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Issue Submission</title>
<link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
  <div class="page">
    <a href="/" class="back-link">&larr; All forms</a>
    <div class="eyebrow"><span class="dot"></span> ISSUE SUBMISSION</div>
    <h1 id="title">Loading…</h1>
    <p class="subtitle" id="desc"></p>

    <div class="form-card">
      <form id="issueForm">
        <div class="field">
          <label>Brand / Platform <span class="required">*</span></label>
          <select name="brand" required></select>
        </div>
        <div class="field">
          <label>Your Name / Agent ID <span class="required">*</span></label>
          <input type="text" name="reporter" required placeholder="e.g. Nadia (CS-04)" />
        </div>
        <div id="dynamicFields"></div>
        <div class="form-actions">
          <button type="submit" class="btn-submit" id="submitBtn">Submit</button>
          <span id="statusMsg" class="status-msg"></span>
        </div>
      </form>
    </div>
  </div>

  <script src="/assets/schemas.js"></script>
  <script src="/assets/app.js"></script>
</body>
</html>
