<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>INR CS Team - TBC</title>
<link rel="stylesheet" href="/assets/style.css" />
<script src="/assets/theme.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <img src="/assets/img/logo.webp" alt="HeyVIP" class="logo-img" />
      <span class="wordmark">INR CS TEAM - TBC</span>
    </div>
    <div class="topbar-right">
      <span class="clock" id="liveClock"></span>
      <button class="theme-pill" id="themeToggle"></button>
      <span class="agent-whoami" id="agentWhoami"></span>
    </div>
  </header>

  <nav class="brand-row" id="brandRow"></nav>

  <div class="edit-modal-backdrop" id="editModalBackdrop">
    <div class="edit-modal">
      <p class="edit-modal-title" id="editModalTitle">Edit brand</p>
      <div class="field">
        <label>Password</label>
        <input type="password" id="editPassword" placeholder="Edit password..." />
      </div>
      <div class="field">
        <label>Logo image</label>
        <input type="file" id="editLogo" accept="image/*" />
        <p class="edit-modal-note" id="editLogoFilename">No file selected yet.</p>
      </div>
      <div class="field">
        <label>Link (opens when the pill is clicked)</label>
        <input type="text" id="editLink" placeholder="https://..." />
      </div>
      <p class="edit-modal-note" id="editModalNote"></p>
      <div class="edit-modal-actions">
        <button type="button" class="btn-secondary" id="editCancel">Cancel</button>
        <button type="button" class="btn-submit" id="editSave">Save</button>
      </div>
    </div>
  </div>

  <div class="hub-layout">
    <aside class="sidebar">
      <div class="sidebar-header"><span class="dot"></span> ISSUE SUBMISSION</div>
      <a href="/" class="sidebar-item active" style="--item-accent:#7c6cf0;">
        <div class="icon" style="background:#7c6cf033;">🏠</div>
        <div class="text">
          <div class="name">Home</div>
          <div class="desc">Hub overview</div>
        </div>
        <span class="arrow">&rarr;</span>
      </a>
      <div id="sidebarList"></div>
    </aside>
    <main class="hub-main">
      <div class="inner">
        <div class="tool-cards">
          <a href="/threads.html" class="tool-card" id="threadsCard" style="--tool-accent:#38bdf8;">
            <div class="t-icon" style="background:#38bdf833;">💬<span class="t-badge" id="threadsUnreadBadge"></span></div>
            <div class="t-name">TG Reply Threads</div>
            <div class="t-desc">Track Telegram replies to your form submissions in real-time</div>
            <div class="t-sub-stat" id="threadsUnsolvedStat"></div>
          </a>
          <a href="/promo.html" class="tool-card" style="--tool-accent:#f472b6;">
            <div class="t-icon" style="background:#f472b633;">🎟️</div>
            <div class="t-name">Promo Code Search</div>
            <div class="t-desc">Search multiple promo codes at once</div>
          </a>
        </div>

        <div class="hub-stats" id="hubStats"></div>
      </div>

      <span class="status-badge status-badge-corner"><span class="pulse"></span> Connected · Telegram + Sheets</span>
    </main>
  </div>

  <script src="/assets/schemas.js"></script>
  <script>
    window.initThemeToggle();
    window.initClock();

    // Shares the same localStorage key threads.html uses — if the agent
    // already logged in there, Home shows who's logged in too, with a
    // logout button right next to the theme toggle. Home itself never
    // requires login; this is purely a "you're logged in elsewhere"
    // indicator + a convenient place to log out from.
    (function renderAgentWhoami() {
      const el = document.getElementById("agentWhoami");
      let auth;
      try { auth = JSON.parse(localStorage.getItem("agentAuth") || "null"); } catch { auth = null; }
      if (!auth) { el.innerHTML = ""; return; }
      const logoutIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>`;
      el.innerHTML = `User: ${escapeHtmlLocal(auth.username)}<span class="role-badge">${escapeHtmlLocal(auth.role)}</span><span class="logout-icon-btn" id="homeLogoutLink" title="Log out">${logoutIcon}</span>`;
      document.getElementById("homeLogoutLink").addEventListener("click", () => {
        localStorage.removeItem("agentAuth");
        localStorage.removeItem("agentLastActivity");
        renderAgentWhoami();
      });
    })();
    function escapeHtmlLocal(str) {
      return String(str == null ? "" : str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    const BRAND_COLORS = ["#4fc3f7", "#f6ad55", "#f4718a", "#8b5cf6", "#34d399"];
    const brandRow = document.getElementById("brandRow");
    let brandConfig = {};
    let editingBrand = null;
    let unlockedPassword = sessionStorage.getItem("brandEditPassword") || "";

    function renderBrandRow() {
      brandRow.innerHTML = "";
      window.BRANDS.forEach((b, i) => {
        const entry = brandConfig[b.id] || {};
        const el = document.createElement("div");
        el.className = "brand-pill";
        const initials = b.name.slice(0, 2).toUpperCase();
        const avatar = entry.logoUrl
          ? `<img class="avatar" src="${entry.logoUrl}" alt="${b.name}" />`
          : `<span class="avatar" style="background:${BRAND_COLORS[i % BRAND_COLORS.length]};">${initials}</span>`;
        el.innerHTML = `${avatar}<span class="pill-name">${b.name}</span><button type="button" class="pill-edit" title="Edit ${b.name}" data-brand="${b.id}">✏️</button>`;
        el.querySelector(".pill-name").addEventListener("click", () => {
          if (entry.link) window.open(entry.link, "_blank", "noopener");
        });
        el.querySelector(".pill-edit").addEventListener("click", (e) => {
          e.stopPropagation();
          openEditModal(b);
        });
        brandRow.appendChild(el);
      });
    }

    async function loadBrandConfig() {
      try {
        const res = await fetch("/api/brand-config");
        const data = await res.json();
        if (data.ok) brandConfig = data.config || {};
      } catch {
        // Non-fatal — pills just fall back to colored initials.
      }
      renderBrandRow();
    }
    loadBrandConfig();

    // ---- TG Reply Threads card: unsolved count + total unread badge ----
    function getSeenCount(id) {
      return parseInt(localStorage.getItem(`lastseen:${id}`) || "0", 10);
    }
    async function loadThreadsSummary() {
      try {
        const res = await fetch("/api/threads", { cache: "no-store" });
        const data = await res.json();
        if (!data.ok) return;
        const all = [...(data.active || []), ...(data.solved || [])];
        const unread = all.reduce((sum, t) => sum + Math.max(0, (t.replyCount || 0) - getSeenCount(t.id)), 0);
        const unsolvedCount = (data.active || []).length;

        const badge = document.getElementById("threadsUnreadBadge");
        if (badge) badge.textContent = unread > 0 ? (unread > 99 ? "99+" : unread) : "";
        const stat = document.getElementById("threadsUnsolvedStat");
        if (stat) {
          stat.textContent = unsolvedCount > 0 ? `${unsolvedCount} unsolved` : "All caught up ✓";
          stat.classList.toggle("has-unsolved", unsolvedCount > 0);
        }
      } catch {
        // Non-fatal — card just shows without the live counts.
      }
    }
    loadThreadsSummary();
    setInterval(loadThreadsSummary, 15000);

    // ---- Edit modal ----
    const backdrop = document.getElementById("editModalBackdrop");
    const modalTitle = document.getElementById("editModalTitle");
    const modalNote = document.getElementById("editModalNote");
    const passwordInput = document.getElementById("editPassword");
    const logoInput = document.getElementById("editLogo");
    const logoFilename = document.getElementById("editLogoFilename");
    const linkInput = document.getElementById("editLink");

    logoInput.addEventListener("change", () => {
      if (logoInput.files[0]) {
        logoFilename.textContent = `Selected: ${logoInput.files[0].name} (${Math.round(logoInput.files[0].size / 1024)} KB)`;
        logoFilename.className = "edit-modal-note ok";
      } else {
        logoFilename.textContent = "No file selected yet.";
        logoFilename.className = "edit-modal-note";
      }
    });

    function openEditModal(brand) {
      editingBrand = brand;
      modalTitle.textContent = `Edit ${brand.name}`;
      modalNote.textContent = "";
      modalNote.className = "edit-modal-note";
      passwordInput.value = unlockedPassword;
      logoInput.value = "";
      logoFilename.textContent = "No file selected yet.";
      logoFilename.className = "edit-modal-note";
      linkInput.value = (brandConfig[brand.id] && brandConfig[brand.id].link) || "";
      backdrop.classList.add("is-open");
    }
    function closeEditModal() {
      backdrop.classList.remove("is-open");
      editingBrand = null;
    }
    document.getElementById("editCancel").addEventListener("click", closeEditModal);
    backdrop.addEventListener("click", (e) => { if (e.target === backdrop) closeEditModal(); });

    document.getElementById("editSave").addEventListener("click", async () => {
      if (!editingBrand) return;
      const password = passwordInput.value;
      if (!password) {
        modalNote.textContent = "Enter the edit password.";
        modalNote.className = "edit-modal-note err";
        return;
      }
      modalNote.textContent = "Saving…";
      modalNote.className = "edit-modal-note";

      const form = new FormData();
      form.append("password", password);
      form.append("brand", editingBrand.id);
      form.append("link", linkInput.value || "");
      if (logoInput.files[0]) form.append("logo", logoInput.files[0]);

      try {
        const res = await fetch("/api/brand-config", { method: "POST", body: form });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || "Save failed.");
        brandConfig = data.config;
        unlockedPassword = password;
        sessionStorage.setItem("brandEditPassword", password);
        renderBrandRow();
        modalNote.textContent = "Saved.";
        modalNote.className = "edit-modal-note ok";
        setTimeout(closeEditModal, 600);
      } catch (err) {
        modalNote.textContent = err.message || "Save failed.";
        modalNote.className = "edit-modal-note err";
      }
    });

    const hubStats = document.getElementById("hubStats");
    hubStats.innerHTML = `
      <div class="stat"><b>${window.BRANDS.length}</b><span>Brands</span></div>
      <div class="stat"><b>${window.MODULES.length}</b><span>Modules</span></div>
      <div class="stat"><b>24/7</b><span>Live routing</span></div>
    `;

    const list = document.getElementById("sidebarList");
    window.MODULES.forEach((m) => {
      const a = document.createElement("a");
      a.href = `/form.html?module=${m.id}`;
      a.className = "sidebar-item";
      a.style.setProperty("--item-accent", m.accent);
      a.innerHTML = `
        <div class="icon" style="background:${m.accent}33;">${m.icon}</div>
        <div class="text">
          <div class="name">${m.name}</div>
          <div class="desc">${m.description}</div>
        </div>
        <span class="arrow">&rarr;</span>
      `;
      list.appendChild(a);
    });
  </script>
</body>
</html>
